<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Suporte WhatsApp</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Suporte WhatsApp</h1>
      <label>
        Nome do atendente
        <input id="attendantName" type="text" placeholder="Ex: Maria">
      </label>
      <label>
        Endereço da API
        <input id="apiUrl" type="url" placeholder="http://192.168.0.10:3333">
      </label>
      <button id="save">Salvar</button>
      <p id="status" role="status"></p>
      <section class="summary">
        <div class="summary-header">
          <h2>Conversas</h2>
          <button id="refresh" type="button">Atualizar</button>
        </div>
        <div id="conversationList" class="conversation-list">
          <p class="empty">Configure a API para carregar.</p>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
